<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 시대, 일하는 방식의 재설계</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#000000;--bg-sub:#0A0A0A;
  --copper:#D4A574;--copper-dim:rgba(212,165,116,.15);--copper-glow:rgba(212,165,116,.08);
  --teal:#4DC9C4;--teal-dim:rgba(77,201,196,.12);--teal-glow:rgba(77,201,196,.06);
  --warm:#F5C28A;
  --g50:rgba(255,255,255,.04);--g100:rgba(255,255,255,.06);--g200:rgba(255,255,255,.1);
  --g300:rgba(255,255,255,.2);--g400:rgba(255,255,255,.35);--g500:rgba(255,255,255,.5);
  --g600:rgba(255,255,255,.65);--g700:rgba(255,255,255,.8);--g800:rgba(255,255,255,.9);
  --g900:#FFFFFF;--white:#FFFFFF;
  --radius:14px;--radius-sm:10px;
  --shadow-card:0 1px 3px rgba(0,0,0,.3),0 4px 12px rgba(0,0,0,.2);
  --shadow-elevated:0 4px 16px rgba(0,0,0,.4),0 12px 40px rgba(0,0,0,.3);
  --transition-slide:opacity .5s cubic-bezier(.4,0,.2,1), transform .5s cubic-bezier(.4,0,.2,1);
  --line:rgba(255,255,255,.08);
}
/*
  TYPE SCALE (5 levels, min 14px) — Pretendard + Inter
  ─────────────────────────────────────────────────────
  L1 Display  : clamp(42px, 5vw, 68px)   — title only
  L2 Heading  : clamp(30px, 3.5vw, 48px) — slide h2 (centered)
  L2s Heading : clamp(26px, 3vw, 40px)   — slide h2 (split layout)
  L3 Sub      : clamp(20px, 2.2vw, 28px) — emphasis, quotes, formulas
  L4 Body     : clamp(17px, 1.6vw, 21px) — all readable text, cards
  L5 Caption  : clamp(14px, 1.2vw, 16px) — tags, labels, refs
  ─────────────────────────────────────────────────────
*/
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100vw;height:100vh;overflow:hidden;font-family:'Pretendard Variable',Pretendard,'Inter',system-ui,sans-serif;background:#000;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;color:var(--g700);}


/* ═══ LAYERED ORB BACKGROUNDS ═══ */
.slide::before,.slide::after{content:'';position:absolute;border-radius:50%;pointer-events:none;z-index:0;filter:blur(60px);}

/* Orb variations — 5 patterns, copper + teal layered */
.slide.orb-a::before{width:50vw;height:50vw;top:-18%;right:-12%;background:radial-gradient(circle,rgba(212,165,116,.35) 0%,rgba(212,165,116,.15) 35%,rgba(212,165,116,.04) 60%,transparent 80%);}
.slide.orb-a::after{width:35vw;height:35vw;bottom:-12%;left:-8%;background:radial-gradient(circle,rgba(77,201,196,.25) 0%,rgba(77,201,196,.08) 40%,transparent 75%);}

.slide.orb-b::before{width:55vw;height:55vw;bottom:-25%;left:15%;background:radial-gradient(circle,rgba(212,165,116,.3) 0%,rgba(212,165,116,.1) 40%,transparent 70%);}
.slide.orb-b::after{width:40vw;height:40vw;top:-15%;right:-8%;background:radial-gradient(circle,rgba(77,201,196,.2) 0%,rgba(77,201,196,.06) 45%,transparent 70%);}

.slide.orb-c::before{width:45vw;height:45vw;top:5%;left:-18%;background:radial-gradient(circle,rgba(77,201,196,.3) 0%,rgba(77,201,196,.1) 35%,rgba(212,165,116,.05) 55%,transparent 75%);}
.slide.orb-c::after{width:30vw;height:30vw;bottom:0%;right:8%;background:radial-gradient(circle,rgba(212,165,116,.25) 0%,rgba(212,165,116,.06) 45%,transparent 70%);}

.slide.orb-d::before{width:60vw;height:60vw;top:-28%;right:-22%;background:radial-gradient(ellipse,rgba(212,165,116,.28) 0%,rgba(77,201,196,.1) 35%,transparent 70%);}
.slide.orb-d::after{width:28vw;height:28vw;bottom:10%;left:3%;background:radial-gradient(circle,rgba(77,201,196,.3) 0%,rgba(77,201,196,.08) 40%,transparent 70%);}

.slide.orb-e::before{width:65vw;height:65vw;bottom:-35%;right:-18%;background:radial-gradient(ellipse at 40% 60%,rgba(77,201,196,.3) 0%,rgba(212,165,116,.12) 35%,transparent 65%);}
.slide.orb-e::after{width:35vw;height:35vw;top:0%;left:-12%;background:radial-gradient(circle,rgba(212,165,116,.2) 0%,rgba(212,165,116,.05) 45%,transparent 70%);}

/* Extra layer for depth — mid-layer glow */
.slide .layer-mid{position:absolute;inset:0;pointer-events:none;z-index:0;}

/* ═══ SLIDE BASE + TRANSITION ═══ */
.slide{position:absolute;inset:0;opacity:0;pointer-events:none;background:var(--bg);transition:opacity .4s ease;overflow:hidden;}
.slide.active{opacity:1;pointer-events:auto;z-index:10;}

/* ═══ LAYOUTS ═══ */
.slide.c{display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:56px 8vw;}
.slide.sp{display:grid;grid-template-columns:1fr 1fr;padding:0;}
.slide.sp .lt,.slide.sp .rt{display:flex;flex-direction:column;justify-content:center;padding:52px 5vw;position:relative;z-index:1;}
.slide.sp .lt{align-items:flex-start;text-align:left;}
.slide.sp .rt{align-items:flex-start;text-align:left;}
.slide.sp .rt.vis{background:rgba(255,255,255,.02);align-items:center;text-align:center;padding:48px 4vw;border-left:1px solid var(--line);}

/* ═══ SLIDE FOOTER ═══ */
.slide-footer{position:absolute;bottom:24px;left:5vw;font-family:'Inter','Pretendard Variable',sans-serif;font-size:12px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.2);z-index:1;}
.slide-section{position:absolute;top:28px;right:5vw;font-family:'Inter','Pretendard Variable',sans-serif;font-size:12px;font-weight:500;letter-spacing:1px;color:var(--copper);opacity:.7;z-index:1;}

/* ═══ THIN DIVIDER ═══ */
.divider{position:absolute;bottom:60px;left:5vw;right:5vw;height:1px;background:var(--line);z-index:1;}

/* ═══ L5 — TAG/CAPTION ═══ */
.tag{display:inline-block;font-family:'Inter','Pretendard Variable',Pretendard,sans-serif;font-size:clamp(13px,1.1vw,15px);font-weight:600;letter-spacing:2px;text-transform:uppercase;margin-bottom:16px;color:var(--copper);opacity:.8;position:relative;z-index:1;}

/* ═══ L1 — DISPLAY ═══ */
h1{font-size:clamp(42px,5vw,68px);font-weight:800;line-height:1.15;letter-spacing:-1.5px;color:var(--white);position:relative;z-index:1;}

/* ═══ L2 — HEADING ═══ */
h2{font-size:clamp(30px,3.5vw,48px);font-weight:700;line-height:1.25;letter-spacing:-.5px;color:var(--white);position:relative;z-index:1;}
.sp h2{font-size:clamp(26px,3vw,40px);}

/* ═══ EMPHASIS — static bright copper underline ═══ */
.em{color:var(--white);font-weight:800;position:relative;background:linear-gradient(90deg,rgba(212,165,116,0.65) 0%,rgba(212,165,116,0.65) 100%);background-repeat:no-repeat;background-size:100% 35%;background-position:0 88%;padding:0 2px;border-radius:2px;}
.accent{color:var(--copper);}

/* ═══ L4 — BODY/LEAD ═══ */
.lead{font-size:clamp(17px,1.6vw,21px);line-height:1.8;color:var(--g500);margin-top:18px;max-width:720px;font-weight:400;position:relative;z-index:1;}
.body{font-size:clamp(17px,1.6vw,21px);line-height:1.8;color:var(--g500);max-width:680px;position:relative;z-index:1;}

/* ═══ L3 — POINT ═══ */
.point{font-size:clamp(20px,2.2vw,28px);font-weight:700;line-height:1.5;color:var(--white);max-width:720px;margin:16px 0;position:relative;z-index:1;}

/* ═══ L5 — NOTE/REF ═══ */
.note{font-size:clamp(14px,1.2vw,16px);color:var(--g400);margin-top:14px;line-height:1.5;position:relative;z-index:1;}
.ref{position:absolute;bottom:24px;font-size:13px;color:rgba(255,255,255,.25);opacity:.7;font-style:italic;z-index:1;}
.slide.c .ref{left:8vw;}.slide.sp .ref{left:5vw;}

/* ═══ QUOTE ═══ */
.qb{padding:28px 32px;margin:20px 0;max-width:660px;background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:var(--radius);text-align:left;position:relative;z-index:1;}
.qb p{font-size:clamp(20px,2.2vw,28px);font-weight:600;line-height:1.6;color:var(--g400);}

/* ═══ SCENE — minimal left border ═══ */
.scene{background:transparent;border:none;border-left:2px solid var(--copper);border-radius:0;padding:2px 0 2px 24px;margin:32px 0 16px 0;font-size:clamp(17px,1.6vw,21px);line-height:1.75;color:var(--g500);text-align:left;max-width:640px;transition:transform .3s ease;position:relative;z-index:1;}
.scene:hover{transform:translateX(3px);}
.sc-label{font-family:'Inter','Pretendard Variable',Pretendard,sans-serif;font-size:clamp(13px,1.1vw,15px);font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--copper);opacity:.6;margin-bottom:8px;}
.scene strong{color:var(--white);}

/* ═══ DIAGRAM ═══ */
.d-flow{display:flex;flex-direction:column;gap:8px;width:100%;max-width:380px;position:relative;z-index:1;}
.d-box{padding:14px 18px;border-radius:var(--radius-sm);font-size:clamp(17px,1.6vw,21px);font-weight:600;text-align:center;line-height:1.4;}
.d-arr{text-align:center;font-size:20px;color:var(--g400);}
.d-box.green{background:rgba(22,163,74,.15);color:#86EFAC;border:1px solid rgba(22,163,74,.2);}
.d-box.red{background:rgba(239,68,68,.12);color:#FCA5A5;border:1px solid rgba(239,68,68,.2);}
.d-box.blue{background:var(--teal-dim);color:var(--teal);border:1px solid rgba(77,201,196,.2);}
.d-box.gray{background:var(--g50);color:var(--g600);border:1px solid var(--g200);}
.d-box.orange{background:var(--copper-dim);color:var(--copper);border:1px solid rgba(212,165,116,.2);}
.d-box.accent-bg{background:var(--copper);color:#000;}

/* ═══ GRID CARDS ═══ */
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;width:100%;max-width:960px;margin:24px 0;position:relative;z-index:1;}
.gc{padding:26px 24px;border-radius:var(--radius);border:1px solid var(--line);text-align:left;background:rgba(255,255,255,.02);transition:transform .3s ease,box-shadow .3s ease,border-color .3s ease;}
.gc:hover{transform:translateY(-3px);border-color:rgba(212,165,116,.2);box-shadow:0 8px 24px rgba(0,0,0,.4);}
.gc .gc-n{font-family:'Inter','Pretendard Variable',Pretendard,sans-serif;font-size:clamp(13px,1.1vw,15px);font-weight:700;color:var(--copper);margin-bottom:8px;letter-spacing:1px;}
.gc .gc-t{font-size:clamp(17px,1.6vw,21px);font-weight:700;color:var(--white);margin-bottom:6px;}
.gc .gc-d{font-size:clamp(17px,1.6vw,21px);color:var(--g400);line-height:1.65;}

/* ═══ VS GRID ═══ */
.vsgrid{display:grid;grid-template-columns:1fr 1fr;gap:24px;width:100%;max-width:720px;margin:20px 0;position:relative;z-index:1;}
.vs-side{padding:24px 22px;border-radius:var(--radius);text-align:left;transition:transform .3s ease;}
.vs-side:hover{transform:translateY(-2px);}
.vs-a{background:rgba(255,255,255,.03);border:1px solid var(--line);}
.vs-b{background:rgba(212,165,116,.06);border:1px solid rgba(212,165,116,.2);}
.vs-lbl{font-family:'Inter','Pretendard Variable',Pretendard,sans-serif;font-size:clamp(13px,1.1vw,15px);font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:12px;}
.vs-a .vs-lbl{color:var(--g400);}.vs-b .vs-lbl{color:var(--copper);}
.vs-item{font-size:clamp(17px,1.6vw,21px);line-height:1.7;color:var(--g600);margin-bottom:3px;}

/* ═══ NUMBERED LIST ═══ */
.nl{max-width:640px;margin:16px 0;text-align:left;position:relative;z-index:1;}
.ni{display:flex;gap:16px;align-items:flex-start;margin-bottom:18px;}
.ni-n{flex-shrink:0;width:30px;height:30px;border-radius:50%;background:var(--copper);color:#000;font-family:'Inter',sans-serif;font-size:14px;font-weight:800;display:flex;align-items:center;justify-content:center;margin-top:3px;}
.ni-t{font-size:clamp(17px,1.6vw,21px);font-weight:600;color:var(--g800);}
.ni-d{font-size:clamp(17px,1.6vw,21px);color:var(--g400);margin-top:4px;line-height:1.65;}

/* ═══ CHIPS ═══ */
.chips{display:flex;flex-wrap:wrap;gap:10px;margin:14px 0;position:relative;z-index:1;}
.chip{padding:10px 18px;border-radius:30px;font-size:clamp(14px,1.2vw,16px);font-weight:600;border:1px solid;transition:transform .15s;}
.chip.c1{background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.25);color:#FCA5A5;}
.chip.c2{background:rgba(255,255,255,.04);border-color:var(--g200);color:var(--g600);}
.chip.c3{background:var(--teal-dim);border-color:rgba(77,201,196,.25);color:var(--teal);}
.chip.c4{background:rgba(255,255,255,.04);border-color:var(--g200);color:var(--g600);}
.chip.c5{background:var(--copper-dim);border-color:rgba(212,165,116,.25);color:var(--copper);}

/* ═══ RT CARD ═══ */
.rt-card{padding:20px 22px;background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:var(--radius);margin-bottom:12px;transition:transform .3s ease,border-color .3s ease;}
.rt-card:hover{transform:translateY(-2px);border-color:rgba(212,165,116,.15);}
.rt-card .rc-t{font-size:clamp(17px,1.6vw,21px);font-weight:700;color:var(--white);margin-bottom:4px;}
.rt-card .rc-d{font-size:clamp(17px,1.6vw,21px);color:var(--g400);line-height:1.6;}

/* ═══ NAV ═══ */
.progress{position:fixed;bottom:0;left:0;height:1px;background:var(--copper);opacity:.5;z-index:200;transition:width .5s cubic-bezier(.4,0,.2,1);}
.counter{position:fixed;bottom:14px;right:28px;font-family:'Inter',sans-serif;font-size:13px;font-weight:500;color:rgba(255,255,255,.2);z-index:200;letter-spacing:.5px;}
.hint{position:fixed;bottom:14px;left:28px;font-family:'Inter',sans-serif;font-size:13px;color:rgba(255,255,255,.15);z-index:200;letter-spacing:.3px;}
.notes-panel{position:fixed;bottom:0;left:0;right:0;background:rgba(0,0,0,.95);color:var(--g500);padding:24px 8vw;font-size:16px;line-height:1.8;max-height:36vh;overflow-y:auto;z-index:300;transform:translateY(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);backdrop-filter:blur(16px);border-top:1px solid var(--line);}
.notes-panel.open{transform:translateY(0);}
.notes-panel .nlbl{font-family:'Inter','Pretendard Variable',Pretendard,sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;color:var(--copper);opacity:.5;margin-bottom:8px;}

/* ═══ RESPONSIVE ═══ */
@media(max-width:900px){.slide.sp{grid-template-columns:1fr;}.slide.c{padding:32px 5vw;}.grid3{grid-template-columns:1fr;}.vsgrid{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div id="deck">
