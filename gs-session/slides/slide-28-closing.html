<!-- ═══ 엔딩 ═══ -->
<section class="slide c orb-a" data-n="[수미쌍관 — 가장 느리게, 눈 맞추며] 오늘 불편한 이야기를 하겠다고 시작했습니다.

[잠시 멈춤] 고충을 이야기했고, 무너질 수 있는 장면들을 보여드렸고, 그래도 가야 할 길이라는 걸 데이터로 확인했고, 내일부터 쓸 수 있는 것들을 나눴습니다.

[잠시 멈춤, 청중 보기] 결국 제일 중요한 건 이겁니다.

[느리게] 흩어진 빛이 만나면 별자리가 됩니다.

오늘 여러분이 겪고 있는 고충, 삐걱거림, 외로움 — 그건 여러분이 먼저 움직이고 있다는 뜻이에요. 혼자일 때는 그냥 빛 하나예요. 아무도 안 알아봐요. 그런데 옆에 한 명이 생기고, 또 한 명이 생기면 — 그때 선이 연결됩니다.

[느리게] 흩어진 빛이 만나면 별자리가 됩니다.

[킥] 여러분이 GS의 첫 별자리입니다.

[잠시 멈춤] 여러분이 잘 하고 계십니다. 방향은 맞습니다. 함께 가시죠. 감사합니다.">
  <div class="layer-mid" style="background:radial-gradient(ellipse at 50% 50%,rgba(212,165,116,0.25) 0%,transparent 50%);"></div>

  <!-- 별자리 SVG -->
  <div style="width:100%;max-width:760px;margin:0 auto;">
    <svg viewBox="0 0 760 380" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:100%;display:block;">
      <defs>
        <!-- 별 반짝임 -->
        <radialGradient id="starGlow"><stop offset="0%" stop-color="#D4A574" stop-opacity=".4"/><stop offset="100%" stop-color="#D4A574" stop-opacity="0"/></radialGradient>
        <radialGradient id="starGlowT"><stop offset="0%" stop-color="#4DC9C4" stop-opacity=".3"/><stop offset="100%" stop-color="#4DC9C4" stop-opacity="0"/></radialGradient>
        <filter id="softGlow"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      </defs>

      <!-- ═══ 하단: 흩어진 개별 빛들 ═══ -->
      <!-- 빛 1 (좌하) -->
      <circle cx="80" cy="320" r="18" fill="url(#starGlow)"/>
      <circle cx="80" cy="320" r="3" fill="#D4A574" filter="url(#softGlow)">
        <animate attributeName="opacity" values=".4;1;.4" dur="3s" repeatCount="indefinite"/>
      </circle>

      <!-- 빛 2 -->
      <circle cx="180" cy="300" r="16" fill="url(#starGlow)"/>
      <circle cx="180" cy="300" r="2.5" fill="#D4A574" filter="url(#softGlow)">
        <animate attributeName="opacity" values=".5;1;.5" dur="2.4s" begin=".3s" repeatCount="indefinite"/>
      </circle>

      <!-- 빛 3 -->
      <circle cx="140" cy="260" r="14" fill="url(#starGlow)"/>
      <circle cx="140" cy="260" r="2" fill="#D4A574" filter="url(#softGlow)">
        <animate attributeName="opacity" values=".3;.9;.3" dur="2.8s" begin=".7s" repeatCount="indefinite"/>
      </circle>

      <!-- 빛 4 (우하) -->
      <circle cx="620" cy="330" r="16" fill="url(#starGlow)"/>
      <circle cx="620" cy="330" r="2.5" fill="#D4A574" filter="url(#softGlow)">
        <animate attributeName="opacity" values=".5;1;.5" dur="2.6s" begin=".5s" repeatCount="indefinite"/>
      </circle>

      <!-- 빛 5 -->
      <circle cx="680" cy="290" r="14" fill="url(#starGlow)"/>
      <circle cx="680" cy="290" r="2" fill="#D4A574" filter="url(#softGlow)">
        <animate attributeName="opacity" values=".4;.8;.4" dur="3.2s" begin="1s" repeatCount="indefinite"/>
      </circle>

      <!-- 빛 6 -->
      <circle cx="540" cy="280" r="15" fill="url(#starGlow)"/>
      <circle cx="540" cy="280" r="2" fill="#D4A574" filter="url(#softGlow)">
        <animate attributeName="opacity" values=".3;.9;.3" dur="2.5s" begin=".2s" repeatCount="indefinite"/>
      </circle>

      <!-- ═══ 중간: 가까워지는 빛들 ═══ -->
      <circle cx="260" cy="220" r="16" fill="url(#starGlow)"/>
      <circle cx="260" cy="220" r="3" fill="#D4A574" filter="url(#softGlow)">
        <animate attributeName="opacity" values=".6;1;.6" dur="2.2s" begin=".4s" repeatCount="indefinite"/>
      </circle>

      <circle cx="340" cy="200" r="16" fill="url(#starGlowT)"/>
      <circle cx="340" cy="200" r="3" fill="#4DC9C4" filter="url(#softGlow)">
        <animate attributeName="opacity" values=".5;1;.5" dur="2.6s" begin=".1s" repeatCount="indefinite"/>
      </circle>

      <circle cx="420" cy="210" r="16" fill="url(#starGlow)"/>
      <circle cx="420" cy="210" r="3" fill="#D4A574" filter="url(#softGlow)">
        <animate attributeName="opacity" values=".6;1;.6" dur="2.3s" begin=".6s" repeatCount="indefinite"/>
      </circle>

      <circle cx="500" cy="230" r="14" fill="url(#starGlowT)"/>
      <circle cx="500" cy="230" r="2.5" fill="#4DC9C4" filter="url(#softGlow)">
        <animate attributeName="opacity" values=".4;.9;.4" dur="2.7s" begin=".8s" repeatCount="indefinite"/>
      </circle>

      <!-- ═══ 상단: 별자리 (연결된 빛들) ═══ -->
      <!-- 연결선 (teal, 가는 선) -->
      <line x1="300" y1="100" x2="360" y2="60" stroke="#4DC9C4" stroke-width="1" opacity=".3">
        <animate attributeName="opacity" values=".15;.4;.15" dur="4s" repeatCount="indefinite"/>
      </line>
      <line x1="360" y1="60" x2="440" y2="80" stroke="#4DC9C4" stroke-width="1" opacity=".3">
        <animate attributeName="opacity" values=".15;.4;.15" dur="4s" begin=".5s" repeatCount="indefinite"/>
      </line>
      <line x1="440" y1="80" x2="400" y2="130" stroke="#4DC9C4" stroke-width="1" opacity=".3">
        <animate attributeName="opacity" values=".15;.4;.15" dur="4s" begin="1s" repeatCount="indefinite"/>
      </line>
      <line x1="400" y1="130" x2="300" y2="100" stroke="#4DC9C4" stroke-width="1" opacity=".3">
        <animate attributeName="opacity" values=".15;.4;.15" dur="4s" begin="1.5s" repeatCount="indefinite"/>
      </line>
      <line x1="360" y1="60" x2="400" y2="130" stroke="#4DC9C4" stroke-width=".8" opacity=".2">
        <animate attributeName="opacity" values=".1;.3;.1" dur="4s" begin="2s" repeatCount="indefinite"/>
      </line>
      <line x1="440" y1="80" x2="490" y2="120" stroke="#4DC9C4" stroke-width=".8" opacity=".2">
        <animate attributeName="opacity" values=".1;.3;.1" dur="4s" begin=".8s" repeatCount="indefinite"/>
      </line>

      <!-- 별자리 꼭짓점 — 빛나는 별들 -->
      <circle cx="300" cy="100" r="20" fill="url(#starGlowT)"/>
      <circle cx="300" cy="100" r="4" fill="#4DC9C4" filter="url(#softGlow)">
        <animate attributeName="opacity" values=".7;1;.7" dur="2s" repeatCount="indefinite"/>
        <animate attributeName="r" values="3.5;4.5;3.5" dur="2s" repeatCount="indefinite"/>
      </circle>

      <circle cx="360" cy="60" r="24" fill="url(#starGlow)"/>
      <circle cx="360" cy="60" r="5" fill="#D4A574" filter="url(#softGlow)">
        <animate attributeName="opacity" values=".8;1;.8" dur="1.8s" begin=".3s" repeatCount="indefinite"/>
        <animate attributeName="r" values="4;6;4" dur="1.8s" begin=".3s" repeatCount="indefinite"/>
      </circle>

      <circle cx="440" cy="80" r="20" fill="url(#starGlowT)"/>
      <circle cx="440" cy="80" r="4" fill="#4DC9C4" filter="url(#softGlow)">
        <animate attributeName="opacity" values=".7;1;.7" dur="2.2s" begin=".6s" repeatCount="indefinite"/>
        <animate attributeName="r" values="3.5;4.5;3.5" dur="2.2s" begin=".6s" repeatCount="indefinite"/>
      </circle>

      <circle cx="400" cy="130" r="18" fill="url(#starGlow)"/>
      <circle cx="400" cy="130" r="3.5" fill="#D4A574" filter="url(#softGlow)">
        <animate attributeName="opacity" values=".6;1;.6" dur="2.4s" begin=".9s" repeatCount="indefinite"/>
        <animate attributeName="r" values="3;4;3" dur="2.4s" begin=".9s" repeatCount="indefinite"/>
      </circle>

      <circle cx="490" cy="120" r="16" fill="url(#starGlowT)"/>
      <circle cx="490" cy="120" r="3" fill="#4DC9C4" filter="url(#softGlow)">
        <animate attributeName="opacity" values=".5;.9;.5" dur="2.6s" begin="1.2s" repeatCount="indefinite"/>
      </circle>

      <!-- 수렴점 — 가장 밝은 별 -->
      <circle cx="380" cy="40" r="30" fill="url(#starGlow)"/>
      <circle cx="380" cy="40" r="3" fill="#fff" opacity=".6" filter="url(#softGlow)">
        <animate attributeName="opacity" values=".4;.8;.4" dur="3s" repeatCount="indefinite"/>
      </circle>
      <line x1="360" y1="60" x2="380" y2="40" stroke="#D4A574" stroke-width=".6" opacity=".15"/>
    </svg>
  </div>

  <!-- 클로징 멘트 -->
  <p style="font-size:clamp(18px,1.6vw,24px);color:var(--g400);text-align:center;margin-top:28px;line-height:1.7;">
    흩어진 빛이 만나면 별자리가 됩니다.
  </p>
  <p style="font-size:clamp(26px,2.8vw,40px);font-weight:700;color:var(--white);text-align:center;margin-top:16px;line-height:1.5;">
    여러분이 <span style="color:var(--copper);">GS의 첫 별자리</span>입니다.
  </p>
</section>
