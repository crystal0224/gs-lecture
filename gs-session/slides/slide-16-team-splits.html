<section class="slide c orb-b" data-n="Steiner 공식으로 돌아갑니다. 지금까지 본 것들 — 기여 공간 소멸, 맥락 증발, 고립 — 전부 프로세스 손실입니다. AI가 잠재 성과를 올렸지만, 프로세스 손실이 더 크게 커진 거예요. 이 상황에서 사람들의 반응은 세 가지입니다. 침묵, 이탈, 사일로. 전부 합리적이고 전부 팀을 죽이는 선택입니다.">
