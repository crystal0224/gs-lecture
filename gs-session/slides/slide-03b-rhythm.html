<!-- ═══ 03b 리듬의 불일치 ═══ -->
<section class="slide orb-d" style="display:grid;grid-template-columns:1fr 1fr;padding:0;" data-n="두 번째, 리듬의 불일치. AI로 가자니 팀 리듬이 깨지고, 기존대로 가자니 더 나은 방법을 알고 있으니 답답합니다. 제안하면 '음... 일단 기존대로 하자' 돌아와요. 안 하면 답답하고, 하면 혼자 튀는 사람이 됩니다.">
  <div class="layer-mid" style="background:radial-gradient(ellipse at 60% 50%,rgba(77,201,196,0.18) 0%,transparent 40%);"></div>

  <!-- 좌측: 제목 + 핵심 딜레마 -->
  <div style="display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:0 5vw;position:relative;z-index:1;">
    <div class="tag">리듬의 불일치</div>
    <h2 style="font-size:clamp(28px,3.2vw,44px);">방법을 아는데 팀과 <span class="em">안 맞는다</span></h2>
    <p style="font-size:clamp(18px,1.6vw,24px);font-weight:700;color:var(--white);margin-top:28px;line-height:1.7;">안 하면 답답하고<br>하면 혼자 튀는 사람</p>
  </div>

  <!-- 우측: 구체적 상황 카드 -->
  <div style="display:flex;flex-direction:column;justify-content:center;gap:18px;padding:48px 4vw;position:relative;z-index:1;border-left:1px solid var(--line);">

    <!-- AI로 가자니 -->
    <div style="background:rgba(212,165,116,.05);border:1px solid rgba(212,165,116,.2);border-radius:var(--radius);padding:26px 28px;box-shadow:0 4px 20px rgba(0,0,0,.4),0 1px 3px rgba(212,165,116,.08);backdrop-filter:blur(8px);">
      <div style="font-family:'Inter','Pretendard Variable',sans-serif;font-size:clamp(13px,1.1vw,16px);font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--copper);margin-bottom:10px;">AI로 가자니</div>
      <div style="font-size:clamp(18px,1.6vw,24px);font-weight:700;color:var(--white);margin-bottom:8px;">팀 리듬이 깨진다</div>
      <div style="font-size:clamp(15px,1.3vw,19px);color:var(--g500);line-height:1.65;">
        <div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:6px;">
          <span style="color:var(--g300);flex-shrink:0;">—</span>
          <span>나는 AI로 초안을 30분에 뽑는데 팀은 일주일 걸린다</span>
        </div>
        <div style="display:flex;align-items:flex-start;gap:10px;">
          <span style="color:var(--g300);flex-shrink:0;">—</span>
          <span>속도를 맞추려면 기다려야 하고, 혼자 가면 선을 넘는 것</span>
        </div>
      </div>
    </div>

    <!-- 기존대로 가자니 -->
    <div style="background:rgba(77,201,196,.04);border:1px solid rgba(77,201,196,.2);border-radius:var(--radius);padding:26px 28px;box-shadow:0 4px 20px rgba(0,0,0,.4),0 1px 3px rgba(77,201,196,.08);backdrop-filter:blur(8px);">
      <div style="font-family:'Inter','Pretendard Variable',sans-serif;font-size:clamp(13px,1.1vw,16px);font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--teal);margin-bottom:10px;">기존대로 가자니</div>
      <div style="font-size:clamp(18px,1.6vw,24px);font-weight:700;color:var(--white);margin-bottom:8px;">더 나은 방법을 알고 있다</div>
      <div style="font-size:clamp(15px,1.3vw,19px);color:var(--g500);line-height:1.65;">
        <div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:6px;">
          <span style="color:var(--g300);flex-shrink:0;">—</span>
          <span>비효율인 줄 알면서 따라가는 답답함</span>
        </div>
        <div style="display:flex;align-items:flex-start;gap:10px;">
          <span style="color:var(--g300);flex-shrink:0;">—</span>
          <span>제안해도 "일단 기존대로 하자"로 돌아온다</span>
        </div>
      </div>
    </div>

    <!-- 결론 메시지 -->
    <p style="font-size:clamp(19px,1.7vw,25px);font-weight:700;color:var(--white);text-align:center;margin-top:8px;line-height:1.6;">결국 <span style="color:var(--copper);">속도를 숨기거나</span>, <span style="color:var(--copper);">관계를 잃거나</span></p>

  </div>
</section>
